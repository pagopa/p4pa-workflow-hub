server:
  http: "\${SERVER_PORT:8080}"

spring:
  application:
    name: ${artifactId}
    version: ${version}
  jmx.enabled: true
  threads:
    virtual:
      enabled: "\${VIRTUAL_THREADS_ENABLED:true}"
  jpa:
    show-sql: "\${SHOW_SQL:false}"
    hibernate:
      ddl-auto: none
  datasource:
    url: "\${WORKFLOW_HUB_DB_URL:jdbc:postgresql://\${WORKFLOW_HUB_DB_HOST:localhost}:\${WORKFLOW_HUB_DB_PORT:5432}/\${WORKFLOW_HUB_DB_NAME:payhub}?currentSchema=workflow_hub}"
    username: "\${WORKFLOW_HUB_DB_USER}"
    password: "\${WORKFLOW_HUB_DB_PASSWORD}"
    driverClassName: org.postgresql.Driver
  data:
    rest:
      basePath: crud
  temporal:
    namespace: "\${TEMPORAL_SERVER_NAMESPACE:pu}"
    connection:
      enable-https: "\${TEMPORAL_SERVER_ENABLE_HTTPS:false}"
      target: "\${TEMPORAL_SERVER_HOST:localhost}:\${TEMPORAL_SERVER_PORT:7233}"
    workers-auto-discovery:
      packages:
        - it.gov.pagopa.pu.workflow.wf
    workers:
      # generic
      - task-queue: LowPriorityWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_LOW_PRIORITY_POLLER_SIZE:3}"
      # debt position
      - task-queue: DebtPositionWF
        capacity:
          max-concurrent-activity-task-pollers: "\${WF_DP_LOW_PRIORITY_POLLER_SIZE:3}"
      - task-queue: DebtPositionSyncWF
        capacity:
          max-concurrent-activity-task-pollers: "\${WF_DP_RESERVED_SYNC_POLLER_SIZE:10}"
      - task-queue: DebtPositionSyncWF_LOCAL
        capacity:
          max-concurrent-activity-task-pollers: "\${WF_DP_RESERVED_SYNC_LOCAL_POLLER_SIZE:10}"
      # debt position custom WF sync
      - task-queue: DebtPositionCustomSyncWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_DP_RESERVED_CUSTOM_SYNC_POLLER_SIZE:5}"
      - task-queue: DebtPositionCustomSyncWF_LOCAL
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_DP_RESERVED_CUSTOM_SYNC_LOCAL_POLLER_SIZE:5}"
      # ingestion flow
      - task-queue: IngestionFlowFileWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_IMPORT_MEDIUM_PRIORITY_POLLER_SIZE:3}"
      - task-queue: IngestionFlowFileWF_LOCAL
        capacity:
          max-concurrent-activity-task-pollers: "\${WF_IMPORT_MEDIUM_PRIORITY_LOCAL_POLLER_SIZE:2}"
      # export file
      - task-queue: ExportFileWF
        capacity:
          max-concurrent-activity-task-pollers: "\${WF_EXPORT_MEDIUM_PRIORITY_POLLER_SIZE:3}"
      - task-queue: ExportFileWF_LOCAL
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_EXPORT_MEDIUM_PRIORITY_LOCAL_POLLER_SIZE:2}"
      # classification
      - task-queue: ClassificationWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_CLASSIFICATION_MEDIUM_PRIORITY_POLLER_SIZE:3}"
      - task-queue: ClassificationWF_LOCAL
        capacity:
          max-concurrent-activity-task-pollers: "\${WF_CLASSIFICATION_MEDIUM_PRIORITY_LOCAL_POLLER_SIZE:2}"
      # pagopa send
      - task-queue: SendNotificationProcessWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_SEND_RESERVED_NOTIFICATION_POLLER_SIZE:3}"
      - task-queue: SendNotificationProcessWF_LOCAL
        capacity:
          max-concurrent-activity-task-pollers: "\${WF_SEND_RESERVED_NOTIFICATION_LOCAL_POLLER_SIZE:2}"
      - task-queue: SendWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_SEND_LOW_PRIORITY_POLLER_SIZE:3}"
      # assessments
      - task-queue: AssessmentCreationWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_ASSESSMENTS_RESERVED_CREATION_POLLER_SIZE:5}"
      - task-queue: AssessmentsWF
        capacity:
          max-concurrent-workflow-task-pollers: "\${WF_ASSESSMENTS_POLLER_SIZE:5}"
  cloud:
    function:
      definition: paymentsConsumer;paymentsProducer
    stream:
      binders:
        kafka-payments-producer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_BINDER_BROKER:}"
              configuration:
                sasl.jaas.config: "\${KAFKA_PAYMENTS_PRODUCER_SASL_JAAS_CONFIG:}"
                key.serializer: org.apache.kafka.common.serialization.StringSerializer
        kafka-payments-consumer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_BINDER_BROKER:}"
              configuration:
                sasl.jaas.config: "\${KAFKA_PAYMENTS_SASL_JAAS_CONFIG:}"
        kafka-data-events-producer:
          type: kafka
          environment:
            spring.cloud.stream.kafka.binder:
              brokers: "\${KAFKA_BINDER_BROKER:}"
              configuration:
                sasl.jaas.config: "\${KAFKA_DATA_EVENTS_PRODUCER_SASL_JAAS_CONFIG:}"
                key.serializer: org.apache.kafka.common.serialization.StringSerializer
      bindings:
        paymentsProducer-out-0:
          binder: kafka-payments-producer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_PAYMENTS:p4pa-payhub-payments-evh}"
        paymentsConsumer-in-0:
          binder: kafka-payments-consumer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_PAYMENTS:p4pa-payhub-payments-evh}"
          group: "\${KAFKA_PAYMENTS_GROUP_ID:p4pa-workflow-hub-consumer-group}"
          consumer.auto-startup: "\${KAFKA_PAYMENTS_CONSUMER_ENABLED:true}"
        dataEventsProducer-out-0:
          binder: kafka-data-events-producer
          content-type: "\${KAFKA_CONTENT_TYPE:application/json}"
          destination: "\${KAFKA_TOPIC_DATA_EVENTS:p4pa-payhub-data-events-evh}"
      kafka:
        binder:
          auto-create-topics: false
          configuration:
            heartbeat.interval.ms: "\${KAFKA_CONFIG_HEARTBEAT_INTERVAL_MS:3000}"
            session.timeout.ms: "\${KAFKA_CONFIG_SESSION_TIMEOUT_MS:30000}"
            request.timeout.ms: "\${KAFKA_CONFIG_REQUEST_TIMEOUT_MS:60000}"
            metadata.max.age.ms: "\${KAFKA_CONFIG_METADATA_MAX_AGE:180000}"
            sasl.mechanism: "\${KAFKA_CONFIG_SASL_MECHANISM:PLAIN}"
            security.protocol: "\${KAFKA_CONFIG_SECURITY_PROTOCOL:SASL_SSL}"
            max.request.size: "\${KAFKA_CONFIG_MAX_REQUEST_SIZE:1000000}"
        binders:
          paymentsProducer-out-0:
            producer:
              configuration:
                client.id: workflow-hub
                connections.max.idle.ms: "\${KAFKA_PAYMENTS_PRODUCER_CONNECTION_MAX_IDLE_TIME:180000}"
                retry.backoff.ms: "\${KAFKA_PAYMENTS_PRODUCER_RETRY_MS:\${KAFKA_RETRY_MS:10000}}"
                linger.ms: "\${KAFKA_PAYMENTS_PRODUCER_LINGER_MS:\${KAFKA_LINGER_MS:2}}"
                batch.size: "\${KAFKA_PAYMENTS_PRODUCER_BATCH_SIZE:\${KAFKA_BATCH_SIZE:16384}}"
          paymentsConsumer-in-0:
            consumer:
              autoCommitOffset: "\${KAFKA_PAYMENTS_AUTO_COMMIT:\${KAFKA_CONSUMER_CONFIG_AUTO_COMMIT:true}}"
              configuration:
                connections.max.idle.ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTIONS_MAX_IDLE_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTIONS_MAX_IDLE_MS:180000}}"
                max.poll:
                  interval.ms: "\${KAFKA_PAYMENTS_INTERVAL_TIMEOUT_MS:\${KAFKA_CONFIG_MAX_POLL_INTERVAL_TIMEOUT_MS:300000}}"
                  records: "\${KAFKA_PAYMENTS_MAX_POLL_SIZE:\${KAFKA_CONSUMER_CONFIG_MAX_POLL_SIZE:500}}"
                socket.connection.setup.timeout:
                  max.ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTION_TIMEOUT_MAX_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MAX_MS:200000}}"
                  ms: "\${KAFKA_PAYMENTS_REQUEST_CONNECTION_TIMEOUT_MS:\${KAFKA_CONSUMER_CONFIG_CONNECTION_TIMEOUT_MS:100000}}"
              standardHeaders: "\${KAFKA_PAYMENTS_STANDARD_HEADERS:\${KAFKA_CONSUMER_CONFIG_STANDARD_HEADERS:both}}"
              startOffset: "\${KAFKA_PAYMENTS_REQUEST_START_OFFSET:\${KAFKA_CONSUMER_CONFIG_START_OFFSET:earliest}}"
          dataEventsProducer-out-0:
            producer:
              configuration:
                client.id: workflow-hub
                connections.max.idle.ms: "\${KAFKA_DATA_EVENTS_PRODUCER_CONNECTION_MAX_IDLE_TIME:180000}"
                retry.backoff.ms: "\${KAFKA_DATA_EVENTS_PRODUCER_RETRY_MS:\${KAFKA_RETRY_MS:10000}}"
                linger.ms: "\${KAFKA_DATA_EVENTS_PRODUCER_LINGER_MS:\${KAFKA_LINGER_MS:2}}"
                batch.size: "\${KAFKA_DATA_EVENTS_PRODUCER_BATCH_SIZE:\${KAFKA_BATCH_SIZE:16384}}"
management:
  info:
    build.enabled: true
    java.enabled: true
    git.enabled: true
  tracing:
    baggage.remote-fields:
      - X-user-id
  observations:
    http.server:
        filter.order: -100
  endpoints:
    jmx:
      exposure.include: "*"
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  health:
    mail.enabled: false
  endpoint:
    health:
      probes.enabled: true
      logging.slow-indicator-threshold: "\${HEALTH_ACTUATOR_LOGGER_TIMEOUT_DURATION:PT1S}"
      show-details: "\${HEALTH_ACTUATOR_SHOW_DETAILS:when-authorized}"
      group:
        readiness.include: "*"
        liveness.include: livenessState,diskSpace,ping,binders
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${artifactId}
    export:
      prometheus:
        enabled: true
        step: 1m
        descriptions: true
    enable:
      jvm: true
      process: true
      system: true
      http: true
      logback: true

springwolf:
  docket:
    base-package: it.gov.pagopa.pu.workflow.event
    info:
      title: "\${spring.application.name}"
      version: "\${spring.application.version}"
      description: AsyncAPI And Models
    servers.kafka-server:
      protocol: kafka
      host: "\${KAFKA_BINDER_BROKER:localhost:9093}"
  use-fqn: false

logging:
  level:
    root: "\${LOG_LEVEL_ROOT:INFO}"
    it.gov.pagopa: "\${LOG_LEVEL_PAGOPA:INFO}"
    org.springframework: "\${LOG_LEVEL_SPRING:INFO}"
    org.springframework.boot.availability: "\${LOG_LEVEL_SPRING_BOOT_AVAILABILITY:DEBUG}"
    org.springframework.kafka: "\${LOG_LEVEL_SPRING_KAFKA:INFO}"
    org.apache.kafka.clients.consumer.internals.ConsumerCoordinator: "\${LOG_LEVEL_KAFKA_CONSUMER_COORDINATOR:WARN}"
    it.gov.pagopa.pu.workflow.exception.WorkflowExceptionHandler: "\${LOGGING_LEVEL_API_REQUEST_EXCEPTION:INFO}"
    org.springdoc.core.utils.SpringDocAnnotationsUtils: "\${LOG_LEVEL_SPRING_DOC:ERROR}"
    PERFORMANCE_LOG: "\${LOG_LEVEL_PERFORMANCE_LOG:INFO}"
    PERFORMANCE_LOG.API_REQUEST: "\${LOG_LEVEL_PERFORMANCE_LOG_API_REQUEST:\${logging.level.PERFORMANCE_LOG}}"
    PERFORMANCE_LOG.REST_INVOKE: "\${LOG_LEVEL_PERFORMANCE_LOG_REST_INVOKE:\${logging.level.PERFORMANCE_LOG}}"

workflow:
  default:
    startToCloseTimeoutInSeconds: "\${DEFAULT_ACTIVITY_CONFIG_START_TO_CLOSE_TIMEOUT_IN_SECONDS:300}"
    retryInitialIntervalInMillis: "\${DEFAULT_ACTIVITY_CONFIG_RETRY_INITIAL_INTERVAL_IN_MILLIS:1000}"
